<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#111827">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="카드혜택">
<link rel="manifest" href="manifest.json">
<title>카드 혜택매니저 v2.1</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#f3f4f6;--surface:#fff;--line:#e5e7eb;--text:#111827;--muted:#6b7280;--green:#16a34a;--blue:#2563eb}
body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;background:var(--bg);color:var(--text);font-size:14px;padding-bottom:90px}
header{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:14px 16px}
.h{display:flex;justify-content:space-between;align-items:center;gap:10px}.ttl{font-size:22px;font-weight:900}.sub{font-size:12px;color:var(--muted);margin-top:3px}.pill{font-size:12px;font-weight:900;color:#92400e;background:#fef3c7;border-radius:999px;padding:6px 10px;white-space:nowrap}
main{padding:14px;max-width:760px;margin:auto}.notice{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:16px;padding:12px;margin-bottom:12px;font-size:12px;line-height:1.55}
.summary{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}.tile{background:white;border:1px solid var(--line);border-radius:16px;padding:13px}.tl{font-size:11px;color:var(--muted);font-weight:800}.tv{font-size:18px;font-weight:900;margin-top:3px}.ts{font-size:11px;color:var(--muted);margin-top:2px}
.card{background:white;border:1px solid var(--line);border-radius:18px;margin-bottom:12px;overflow:hidden}.ch{padding:15px;display:flex;gap:12px;align-items:center}.icon{width:46px;height:60px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:white;font-weight:900;font-size:13px;box-shadow:0 6px 15px rgba(0,0,0,.12);flex:none}.body{flex:1;min-width:0}.name{font-size:16px;font-weight:900}.meta{font-size:11px;color:var(--muted);margin-top:2px}.period{font-size:10px;color:#64748b;margin-top:3px}.amt{font-size:16px;font-weight:900;text-align:right}.target{font-size:11px;color:var(--muted);text-align:right}
.barw{height:9px;background:#eef2f7;border-radius:999px;overflow:hidden;margin:0 15px 12px}.bar{height:100%;border-radius:999px;transition:.3s}
.row{display:flex;gap:8px;padding:0 15px 15px;flex-wrap:wrap}.btn{border:none;border-radius:12px;padding:10px 12px;font-weight:900;font-family:inherit;background:#f3f4f6;color:#374151;flex:1}.btn.primary{background:#111827;color:#fff}.btn.blue{background:#eff6ff;color:#1d4ed8}.btn.red{background:#fef2f2;color:#dc2626}
.boost{margin:0 15px 15px;background:linear-gradient(135deg,#1d4ed8,#0f172a);color:white;border-radius:16px;padding:14px}.bt{font-size:14px;font-weight:900;margin-bottom:10px;display:flex;justify-content:space-between}.bg{display:grid;grid-template-columns:1fr 1fr;gap:8px}.bi{background:rgba(255,255,255,.13);border-radius:12px;padding:10px}.bl{font-size:10px;opacity:.78;font-weight:800}.bv{font-size:18px;font-weight:900;margin-top:2px}.bs{font-size:10px;opacity:.7;margin-top:2px}.boost .barw{margin:10px 0 5px;background:rgba(255,255,255,.25)}.boost .bar{background:white}.bn{font-size:11px;opacity:.8;display:flex;justify-content:space-between}
.tools{background:white;border:1px solid var(--line);border-radius:18px;padding:13px;margin-top:14px}.tools h3{font-size:15px;margin-bottom:8px}.tool-row{display:flex;gap:8px;flex-wrap:wrap}.tool-row .btn{flex:1 1 120px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;z-index:50}.sheet{background:white;width:100%;border-radius:24px 24px 0 0;padding:18px;max-height:88vh;overflow:auto}.handle{width:38px;height:4px;background:#d1d5db;border-radius:99px;margin:0 auto 14px}.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.mh b{font-size:18px}.x{border:none;background:#f3f4f6;border-radius:10px;width:34px;height:34px;font-size:18px}.fg{margin-bottom:12px}.fg label{display:block;font-size:12px;color:var(--muted);font-weight:900;margin-bottom:5px}.fg input,.fg select{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:12px;font-size:16px;font-family:inherit;background:white}.hint{font-size:11px;color:var(--muted);line-height:1.5;margin-top:4px}
.toast{position:fixed;left:50%;bottom:25px;transform:translateX(-50%);background:#111827;color:white;padding:11px 18px;border-radius:999px;font-size:13px;font-weight:900;opacity:0;transition:.25s;z-index:80}.toast.show{opacity:1}
@media(min-width:720px){.modal{align-items:center}.sheet{max-width:520px;margin:auto;border-radius:24px}}
</style>
</head>
<body>
<header><div class="h"><div><div class="ttl">카드 혜택매니저</div><div class="sub" id="periodText"></div></div><div class="pill" id="dDay">현대 D-</div></div></header>
<main>
<div class="notice">현대카드는 전월 24일~당월 23일, 그 외 카드는 해당월 1일~말일 기준으로 표시합니다. 데이터는 이 기기 LocalStorage에만 저장됩니다.</div>
<div class="summary"><div class="tile"><div class="tl">총 월 사용금액</div><div class="tv" id="sumSpent">0원</div><div class="ts">숨김 카드 제외</div></div><div class="tile"><div class="tl">M BOOST 추가 사용 가능</div><div class="tv" id="sumEasyRemain">0원</div><div class="ts">입력 M포인트 기준</div></div></div>
<div class="row" style="padding:0 0 12px"><button class="btn primary" onclick="openCard()">+ 카드 추가</button></div>
<div id="cards"></div>
<div class="tools"><h3>관리</h3><div class="tool-row"><button class="btn" onclick="resetMonth(false)">사용금액 초기화</button><button class="btn red" onclick="resetMonth(true)">전체 초기화</button><button class="btn blue" onclick="backup()">백업</button><button class="btn" onclick="document.getElementById('restore').click()">복원</button><input id="restore" type="file" accept="application/json" style="display:none" onchange="restore(event)"></div></div>
</main>
<div class="modal" id="modal" onclick="closeModal()"><div class="sheet" onclick="event.stopPropagation()"><div class="handle"></div><div class="mh"><b id="mt">수정</b><button class="x" onclick="closeModal()">×</button></div><div id="mb"></div></div></div><div class="toast" id="toast"></div>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js');}
const STORE='benefit-manager-v2.1', MONTH='benefit-manager-period-key-v2.1';
const COLORS=['#e11d48','#0ea5e9','#a855f7','#f97316','#22c55e','#334155','#111827','#2563eb'];
const defaultCards=[
{id:'red',name:'SC제일은행-the Red',short:'RED',color:'#e11d48',target:300000,spent:1048382,hidden:false,kind:'normal',periodType:'hyundai'},
{id:'mboost',name:'SC 현대카드 M BOOST',short:'M',color:'#0ea5e9',target:500000,spent:491966,hidden:false,kind:'mboost',mPoint:0,periodType:'hyundai'},
{id:'woori',name:'LG전자 우리카드',short:'W',color:'#94a3b8',target:300000,spent:318300,hidden:true,kind:'normal',periodType:'monthly'},
{id:'lotte',name:'스페셜 롯데카드(LG전자)',short:'L',color:'#a855f7',target:300000,spent:297000,hidden:false,kind:'normal',periodType:'monthly'},
{id:'ssg',name:'SSG닷컴 삼성카드',short:'SSG',color:'#f97316',target:100000,spent:49185,hidden:false,kind:'normal',periodType:'monthly'},
{id:'kakao',name:'카카오페이신용카드',short:'K',color:'#22c55e',target:200000,spent:48800,hidden:false,kind:'normal',periodType:'monthly'},
{id:'hipass',name:'카드의정석2 후불하이패스+',short:'H',color:'#0ea5e9',target:100000,spent:0,hidden:false,kind:'normal',periodType:'monthly'}];
let data=load(), editing=null;
function load(){try{let old=localStorage.getItem('benefit-manager-v2.0');let r=localStorage.getItem(STORE)||old; if(r){let d=JSON.parse(r); d.cards.forEach(c=>{if(c.id==='mboost'&&c.mPoint===undefined)c.mPoint=0;if(c.hidden===undefined)c.hidden=!!c.hide;if(!c.periodType)c.periodType=(c.id==='red'||c.id==='mboost'||/현대|Hyundai|M BOOST|Red/i.test(c.name))?'hyundai':'monthly'}); return d}}catch(e){} return {cards:JSON.parse(JSON.stringify(defaultCards))}}
function save(){localStorage.setItem(STORE,JSON.stringify(data))}
function fmt(n){return Math.round(Number(n||0)).toLocaleString('ko-KR')+'원'} function num(n){return Math.round(Number(n||0)).toLocaleString('ko-KR')}
function getPeriod(type){let now=new Date(), y=now.getFullYear(), m=now.getMonth();let start,end,labelName;
 if(type==='hyundai'){start=new Date(y,m-1,24); end=new Date(y,m,23); if(now.getDate()>23){start=new Date(y,m,24); end=new Date(y,m+1,23)} labelName='현대 24~23'}
 else{start=new Date(y,m,1); end=new Date(y,m+1,0); labelName='월 1일~말일'}
 let dleft=Math.max(0,Math.ceil((new Date(end.getFullYear(),end.getMonth(),end.getDate()+1)-new Date(y,m,now.getDate()))/86400000)-1);
 let key=type+'_'+start.toISOString().slice(0,10)+'_'+end.toISOString().slice(0,10);
 let label=`${start.getFullYear()}.${String(start.getMonth()+1).padStart(2,'0')}.${String(start.getDate()).padStart(2,'0')} ~ ${end.getFullYear()}.${String(end.getMonth()+1).padStart(2,'0')}.${String(end.getDate()).padStart(2,'0')}`;
 return {key,dleft,label,labelName};
}
function autoReset(){let hy=getPeriod('hyundai'), mo=getPeriod('monthly');let last=localStorage.getItem(MONTH);let cur=hy.key+'|'+mo.key;if(!last){localStorage.setItem(MONTH,cur);return} if(last!==cur){data.cards.forEach(c=>{let pt=c.periodType||'monthly'; if(!last.includes(getPeriod(pt).key)){c.spent=0;if(c.kind==='mboost')c.mPoint=0}}); save(); localStorage.setItem(MONTH,cur); toast('새 산정기간 기준으로 자동 초기화했습니다')}}
function pct(a,b){return b?Math.min(100,(Number(a||0)/Number(b))*100):0}
function render(){save();let hy=getPeriod('hyundai'), mo=getPeriod('monthly');periodText.innerText='현대 '+hy.label+' · 기타 '+mo.label;dDay.innerText='현대 D-'+hy.dleft;let visible=data.cards.filter(c=>!c.hidden);sumSpent.innerText=fmt(visible.reduce((s,c)=>s+Number(c.spent||0),0));let m=data.cards.find(c=>c.kind==='mboost');let remainPoint=Math.max(0,10000-(m?Number(m.mPoint||0):0));sumEasyRemain.innerText=fmt(remainPoint/0.05);cards.innerHTML='';data.cards.forEach(c=>{let pr=pct(c.spent,c.target), cp=getPeriod(c.periodType||'monthly'), boost=''; if(c.kind==='mboost'){let mp=Math.min(10000,Number(c.mPoint||0)), rp=Math.max(0,10000-mp), usedSpend=mp/0.05, remainSpend=rp/0.05, ep=pct(mp,10000);boost=`<div class="boost"><div class="bt"><span>간편결제 5% 적립</span><span>${ep.toFixed(1)}%</span></div><div class="bg"><div class="bi"><div class="bl">입력한 현재 적립</div><div class="bv">${num(mp)} M</div><div class="bs">한도 10,000 M</div></div><div class="bi"><div class="bl">추가 사용 가능</div><div class="bv">${fmt(remainSpend)}</div><div class="bs">잔여 ${num(rp)} M</div></div></div><div class="barw"><div class="bar" style="width:${ep}%"></div></div><div class="bn"><span>추정 간편결제 사용액 ${fmt(usedSpend)}</span><span>5% 기준</span></div></div>`} cards.innerHTML+=`<div class="card"><div class="ch"><div class="icon" style="background:linear-gradient(135deg,${c.color},${c.color}cc)">${c.short||'CARD'}</div><div class="body"><div class="name">${c.name}</div><div class="meta">${c.hidden?'숨김 · 총액 제외':'사용실적 확인'} · 목표 ${fmt(c.target)}</div><div class="period">📅 ${cp.labelName}: ${cp.label} · D-${cp.dleft}</div></div><div><div class="amt">${fmt(c.spent)}</div><div class="target">${pr.toFixed(0)}%</div></div></div><div class="barw"><div class="bar" style="width:${pr}%;background:${pr>=100?'#16a34a':c.color}"></div></div>${boost}<div class="row"><button class="btn primary" onclick="openSpend('${c.id}')">실적 입력</button>${c.kind==='mboost'?`<button class="btn blue" onclick="openMPoint()">M포인트 입력</button>`:''}<button class="btn" onclick="openCard('${c.id}')">카드 수정</button></div></div>`})}
function openSpend(id){let c=data.cards.find(x=>x.id===id);editing=id;mt.innerText=c.name+' 실적 입력';mb.innerHTML=`<div class="fg"><label>현재 사용금액</label><input id="spendInput" type="number" value="${c.spent||0}"><div class="hint">해당 카드 산정기간(${getPeriod(c.periodType||'monthly').label}) 기준 사용금액을 입력하세요.</div></div><div class="fg"><label>실적 목표</label><input id="targetInput" type="number" value="${c.target||0}"></div><button class="btn primary" style="width:100%" onclick="saveSpend()">저장</button>`;openModal()}
function saveSpend(){let c=data.cards.find(x=>x.id===editing);c.spent=Number(spendInput.value)||0;c.target=Number(targetInput.value)||0;closeModal();render();toast('저장했습니다')}
function openMPoint(){let c=data.cards.find(x=>x.kind==='mboost');mt.innerText='M BOOST 현재 적립 M포인트';mb.innerHTML=`<div class="fg"><label>간편결제 5% 현재 적립 M포인트</label><input id="mpInput" type="number" value="${c.mPoint||0}"><div class="hint">예: 7,250 M이면 7250 입력 → 추가 사용 가능 55,000원으로 계산합니다.</div></div><button class="btn primary" style="width:100%" onclick="saveMPoint()">저장</button>`;openModal()}
function saveMPoint(){let c=data.cards.find(x=>x.kind==='mboost');c.mPoint=Number(mpInput.value)||0;closeModal();render();toast('M포인트를 저장했습니다')}
function openCard(id){editing=id||null;let c=id?data.cards.find(x=>x.id===id):{name:'',short:'',color:COLORS[0],target:0,spent:0,hidden:false,kind:'normal',periodType:'monthly'};mt.innerText=id?'카드 수정':'카드 추가';mb.innerHTML=`<div class="fg"><label>카드명</label><input id="cardName" value="${c.name||''}"></div><div class="fg"><label>카드 약칭</label><input id="cardShort" value="${c.short||''}" maxlength="4"></div><div class="fg"><label>실적 목표</label><input id="cardTarget" type="number" value="${c.target||0}"></div><div class="fg"><label>현재 사용금액</label><input id="cardSpent" type="number" value="${c.spent||0}"></div><div class="fg"><label>산정기간</label><select id="cardPeriod"><option value="monthly" ${c.periodType!=='hyundai'?'selected':''}>해당월 1일~말일</option><option value="hyundai" ${c.periodType==='hyundai'?'selected':''}>현대카드 24일~23일</option></select></div><div class="fg"><label>색상</label><select id="cardColor">${COLORS.map(x=>`<option value="${x}" ${x===c.color?'selected':''}>${x}</option>`).join('')}</select></div><div class="fg"><label>카드 종류</label><select id="cardKind"><option value="normal" ${c.kind!=='mboost'?'selected':''}>일반 실적 카드</option><option value="mboost" ${c.kind==='mboost'?'selected':''}>M BOOST 간편결제 카드</option></select></div><div class="fg"><label>총액 표시</label><select id="cardHidden"><option value="false" ${!c.hidden?'selected':''}>표시</option><option value="true" ${c.hidden?'selected':''}>숨김</option></select></div><button class="btn primary" style="width:100%;margin-bottom:8px" onclick="saveCard()">저장</button>${id?`<button class="btn red" style="width:100%" onclick="deleteCard()">삭제</button>`:''}`;openModal()}
function saveCard(){let obj={id:editing||('card_'+Date.now()),name:cardName.value.trim()||'새 카드',short:cardShort.value.trim()||'C',color:cardColor.value,target:Number(cardTarget.value)||0,spent:Number(cardSpent.value)||0,hidden:cardHidden.value==='true',kind:cardKind.value,periodType:cardPeriod.value};if(obj.kind==='mboost'){let old=editing?data.cards.find(x=>x.id===editing):null;obj.mPoint=old&&old.mPoint?old.mPoint:0} if(editing)data.cards=data.cards.map(c=>c.id===editing?obj:c);else data.cards.push(obj);closeModal();render();toast('카드를 저장했습니다')}
function deleteCard(){if(!confirm('이 카드를 삭제할까요?'))return;data.cards=data.cards.filter(c=>c.id!==editing);closeModal();render();toast('삭제했습니다')}
function openModal(){modal.style.display='flex'} function closeModal(){modal.style.display='none'}
function resetMonth(all){if(!confirm(all?'전체 데이터를 기본값으로 초기화할까요?':'모든 카드의 사용금액과 M포인트만 0으로 초기화할까요?'))return;if(all){data={cards:JSON.parse(JSON.stringify(defaultCards))}}else data.cards.forEach(c=>{c.spent=0;if(c.kind==='mboost')c.mPoint=0});localStorage.setItem(MONTH,getPeriod('hyundai').key+'|'+getPeriod('monthly').key);render();toast('초기화했습니다')}
function backup(){let b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='card-benefit-backup.json';a.click()}
function restore(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{data=JSON.parse(r.result);data.cards.forEach(c=>{if(!c.periodType)c.periodType=(c.id==='red'||c.id==='mboost')?'hyundai':'monthly'});save();render();toast('복원했습니다')}catch(err){alert('복원 실패')}};r.readAsText(f)}
function toast(msg){let t=document.getElementById('toast');t.innerText=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
autoReset();render();
</script>
</body>
</html>
