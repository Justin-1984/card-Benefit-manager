<script>

const APP_VERSION='6.6.2', STORE='benefit-manager-v6.5', GHCFG='benefit-manager-github-config-v6.5', MONTH='benefit-manager-period-key-v6.safe', SAFE_BACKUP='benefit-manager-safe-backup-v6.6.2';
const defaultGroups=['현대','생활','자동결제','교통','기타'];
const defaultCards=[{id:'red',name:'SC제일은행-the Red',short:'RED',color:'#e11d48',target:300000,spent:0,hidden:false,kind:'normal',periodType:'hyundai',memo:'연 1,200만원 실적 목표',group:'현대',annualGoal:12000000,annualSpent:0},{id:'mboost',name:'SC 현대카드 M BOOST',short:'M',color:'#0ea5e9',target:500000,spent:0,hidden:false,kind:'mboost',mPoint:0,periodType:'hyundai',memo:'간편결제 5% M포인트 확인',group:'현대'}];
let data=load(), editing=null, showHidden=false;
function $(id){return document.getElementById(id)}
function load(){try{let r=localStorage.getItem(STORE)||localStorage.getItem('benefit-manager-v6.4')||localStorage.getItem('benefit-manager-v6.0');if(r){let d=JSON.parse(r);migrate(d);return d}}catch(e){}let d={pinMboost:true,history:[],mpoint:{balance:0,earnedThisMonth:0,usedThisMonth:0,goal:0,goalName:'',memo:'',updatedAt:null,monthHistory:{}},monthlyRecords:{},lastBackupAt:null,groups:[...defaultGroups],cards:JSON.parse(JSON.stringify(defaultCards)),meta:{}};return d}
function migrate(d){if(!d.cards||!Array.isArray(d.cards))d.cards=JSON.parse(JSON.stringify(defaultCards));if(!d.groups)d.groups=[...defaultGroups];if(!d.history)d.history=[];if(!d.monthlyRecords)d.monthlyRecords={};if(!d.meta)d.meta={};if(d.pinMboost===undefined)d.pinMboost=true;if(!d.mpoint)d.mpoint={balance:0,earnedThisMonth:0,usedThisMonth:0,goal:0,goalName:'',memo:'',updatedAt:null};if(!d.mpoint.monthHistory)d.mpoint.monthHistory={};d.cards.forEach(c=>{if(c.hidden===undefined)c.hidden=!!c.hide;if(!c.periodType)c.periodType=(c.id==='red'||c.id==='mboost'||/현대|Hyundai|M BOOST|Red/i.test(c.name))?'hyundai':'monthly';if(!c.group)c.group=c.periodType==='hyundai'?'현대':'기타';if(c.memo===undefined)c.memo='';if(c.kind==='mboost'&&c.mPoint===undefined)c.mPoint=0;if(c.id==='red'||/red|레드/i.test(c.name)){if(c.annualGoal===undefined)c.annualGoal=12000000;if(c.annualSpent===undefined)c.annualSpent=Number(c.spent||0)}})}
function save(mark=true){if(mark){data.meta=data.meta||{};data.meta.updatedAt=Date.now();data.meta.deviceId=getDeviceId();data.meta.deviceName=getDeviceName()}localStorage.setItem(STORE,JSON.stringify(data))}
function fmt(n){return Math.round(Number(n||0)).toLocaleString('ko-KR')+'원'}function num(n){return Math.round(Number(n||0)).toLocaleString('ko-KR')}function mfmt(n){return (Number(n||0)>=0?'+':'')+num(n)+' M'}
function getPeriod(type){let now=new Date(),y=now.getFullYear(),m=now.getMonth(),start,end,labelName;if(type==='hyundai'){start=new Date(y,m-1,24);end=new Date(y,m,23);if(now.getDate()>23){start=new Date(y,m,24);end=new Date(y,m+1,23)}labelName='현대 24~23'}else{start=new Date(y,m,1);end=new Date(y,m+1,0);labelName='월 1일~말일'}let dleft=Math.max(0,Math.ceil((new Date(end.getFullYear(),end.getMonth(),end.getDate()+1)-new Date(y,m,now.getDate()))/86400000)-1);let key=type+'_'+start.toISOString().slice(0,10)+'_'+end.toISOString().slice(0,10);let label=`${start.getFullYear()}.${String(start.getMonth()+1).padStart(2,'0')}.${String(start.getDate()).padStart(2,'0')} ~ ${end.getFullYear()}.${String(end.getMonth()+1).padStart(2,'0')}.${String(end.getDate()).padStart(2,'0')}`;return{key,dleft,label,labelName}}
function monthKey(){let d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')}function monthLabel(k){let [y,m]=k.split('-');return `${y}.${m}`}
function getMPoint(){data.mpoint=data.mpoint||{};if(!data.mpoint.monthHistory)data.mpoint.monthHistory={};return data.mpoint}
function saveMPointMonth(){const m=getMPoint(), key=monthKey();m.monthHistory[key]={balance:Number(m.balance||0),earned:Number(m.earnedThisMonth||0),used:Number(m.usedThisMonth||0),net:Number(m.earnedThisMonth||0)-Number(m.usedThisMonth||0),memo:m.memo||'',savedAt:new Date().toISOString()}}
function mpointStats(){const m=getMPoint(), key=monthKey(), rows=Object.entries(m.monthHistory||{}).sort((a,b)=>a[0].localeCompare(b[0]));const curNet=Number(m.earnedThisMonth||0)-Number(m.usedThisMonth||0);let prev=null;for(let i=rows.length-1;i>=0;i--){if(rows[i][0]!==key){prev=rows[i];break}}const prevBalance=prev?Number(prev[1].balance||0):null;const diffPrev=prevBalance===null?null:Number(m.balance||0)-prevBalance;const y=String(new Date().getFullYear());const yearEarned=rows.filter(([k])=>k.startsWith(y)).reduce((s,[,v])=>s+Number(v.earned||0),0)+(rows.find(([k])=>k===key)?0:Number(m.earnedThisMonth||0));const avgNet=rows.length?rows.slice(-6).reduce((s,[,v])=>s+Number(v.net||0),0)/Math.min(6,rows.length):curNet;let goal=Number(m.goal||0), remain=Math.max(0,goal-Number(m.balance||0));let eta='';if(goal>0){if(remain<=0)eta='목표 달성';else if(avgNet>0)eta=`약 ${Math.ceil(remain/avgNet)}개월 후 예상`;else eta='예상 불가'}return{curNet,prevBalance,diffPrev,yearEarned,avgNet,goal,remain,eta,rows}}
function renderMPointPanel(){const el=$('mpointPanel'),m=getMPoint(),s=mpointStats();const gp=s.goal?Math.min(100,Number(m.balance||0)/s.goal*100):0;el.innerHTML=`<div class="mp-head"><div><div class="mp-title">M포인트 현황</div><div class="mp-sub">${m.updatedAt?'최근 수정 '+new Date(m.updatedAt).toLocaleString('ko-KR'):'RED + M BOOST 통합 관리'}</div></div><button class="btn small" onclick="openMPointDashboard()">수정</button></div><div class="mp-grid"><div class="mp-tile"><div class="mp-l">현재 보유</div><div class="mp-v">${num(m.balance||0)} M</div><div class="mp-s">현대카드 전체 합산</div></div><div class="mp-tile"><div class="mp-l">전월 대비</div><div class="mp-v">${s.diffPrev===null?'기록 없음':mfmt(s.diffPrev)}</div><div class="mp-s">이전 월말 보유 대비</div></div><div class="mp-tile"><div class="mp-l">이번 달 순증감</div><div class="mp-v">${mfmt(s.curNet)}</div><div class="mp-s">적립 - 사용</div></div><div class="mp-tile"><div class="mp-l">올해 누적 적립</div><div class="mp-v">+${num(s.yearEarned)} M</div><div class="mp-s">월별 기록 기준</div></div></div>${s.goal?`<div class="mp-goal"><b>${m.goalName||'목표 M포인트'}</b><div style="display:flex;justify-content:space-between;margin-top:5px;font-size:12px"><span>${num(m.balance||0)} / ${num(s.goal)} M</span><b>${gp.toFixed(1)}%</b></div><div class="mp-barw"><div class="mp-bar" style="width:${gp}%"></div></div><div style="font-size:11px;opacity:.78;margin-top:6px">남은 ${num(s.remain)} M · ${s.eta}</div></div>`:''}`}
function renderMPointHistory(){const el=$('mpointHistoryPanel'),m=getMPoint(),s=mpointStats();const rows=Object.entries(m.monthHistory||{}).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,6);el.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;gap:8px"><div><b>M포인트 월별 기록</b><div class="hint">v6.6은 수동 입력값을 월별 기록으로 저장하고 자동 계산합니다.</div></div><button class="btn small blue" onclick="saveCurrentMPointRecord()">이번 달 기록 저장</button></div>${rows.length?`<div class="month-list">${rows.map(([k,v])=>`<div class="month-row"><span>${monthLabel(k)}<br><small>적립 +${num(v.earned)} · 사용 -${num(v.used)}</small></span><b>${mfmt(v.net)}</b></div>`).join('')}</div>`:'<div class="hint" style="margin-top:10px">아직 월별 기록이 없습니다. M포인트 수정 후 저장하면 기록됩니다.</div>'}`}
function openMPointDashboard(){const m=getMPoint();mt.innerText='M포인트 현황 수정';mb.innerHTML=`<div class="fg"><label>현재 보유 M포인트</label><input id="mpBalance" type="number" value="${m.balance||0}"></div><div class="fg"><label>이번 달 적립</label><input id="mpEarned" type="number" value="${m.earnedThisMonth||0}"></div><div class="fg"><label>이번 달 사용</label><input id="mpUsed" type="number" value="${m.usedThisMonth||0}"></div><div class="fg"><label>목표 이름</label><input id="mpGoalName" value="${m.goalName||''}" placeholder="예: Apple Watch"></div><div class="fg"><label>목표 M포인트</label><input id="mpGoal" type="number" value="${m.goal||0}"></div><div class="fg"><label>메모</label><textarea id="mpMemo">${m.memo||''}</textarea></div><div class="hint">저장하면 이번 달 기록도 함께 갱신됩니다. 카드 내역을 직접 가져오지는 않고, 입력값으로 자동 계산합니다.</div><div class="row" style="margin-top:12px"><button class="btn primary" onclick="saveMPointEdit()">저장</button><button class="btn" onclick="closeModal()">닫기</button></div>`;openModal()}
function saveMPointEdit(){const m=getMPoint();m.balance=Number(mpBalance.value||0);m.earnedThisMonth=Number(mpEarned.value||0);m.usedThisMonth=Number(mpUsed.value||0);m.goal=Number(mpGoal.value||0);m.goalName=mpGoalName.value.trim();m.memo=mpMemo.value.trim();m.updatedAt=Date.now();saveMPointMonth();save();closeModal();render();toast('M포인트 저장 완료')}
function saveCurrentMPointRecord(){saveMPointMonth();save();render();toast('이번 달 M포인트 기록 저장 완료')}
function pct(a,b){return b?Math.min(100,(Number(a||0)/Number(b))*100):0}function statusClass(p){if(p>=100)return'green';if(p>=80)return'orange';return'red'}
function deadlineStatus(card, remainAmt){const d=getPeriod(card.periodType||'monthly').dleft;if(remainAmt<=0)return{cls:'clear',text:'실적 목표 달성'};if(d<=3)return{cls:'danger',text:`마감 D-${d} · ${fmt(remainAmt)} 부족`};if(d<=7)return{cls:'warn',text:`마감 D-${d} · ${fmt(remainAmt)} 부족`};return{cls:'safe',text:`마감 D-${d} · 여유 있음`}}
function orderedCards(){let arr=[...data.cards];if(data.pinMboost){arr.sort((a,b)=>{if(a.kind==='mboost')return-1;if(b.kind==='mboost')return 1;return 0})}return arr}function filteredCards(){let q=($('search').value||'').toLowerCase().trim();return orderedCards().filter(c=>(showHidden||!c.hidden)&&(!q||(`${c.name} ${c.short} ${c.memo} ${c.group}`).toLowerCase().includes(q)))}
function render(){migrate(data);renderMPointPanel();renderMPointHistory();let hy=getPeriod('hyundai'),mo=getPeriod('monthly');$('periodText').innerText=`현대 ${hy.label} · 기타 ${mo.label}`;$('dDay').innerText=`현대 D-${hy.dleft}`;$('hiddenState').innerText=showHidden?'ON':'OFF';const active=data.cards.filter(c=>!c.hidden);$('sumSpent').innerText=fmt(active.reduce((s,c)=>s+Number(c.spent||0),0));const mb=data.cards.find(c=>c.kind==='mboost');let easyRemain=mb?Math.max(0,10000-Number(mb.mPoint||0))/0.05:0;$('sumEasyRemain').innerText=fmt(easyRemain);updateDashboard();updateDeadlineAlert();updateGithubPanel();let groups=[...new Set([...(data.groups||[]),...filteredCards().map(c=>c.group||'기타')])];let html='';groups.forEach(g=>{let list=filteredCards().filter(c=>(c.group||'기타')===g);if(!list.length)return;html+=`<div class="group"><div class="gt">${g} <span>${list.length}개</span></div><div class="cards">${list.map(cardHtml).join('')}</div></div>`});$('cards').innerHTML=html||'<div class="notice">표시할 카드가 없습니다.</div>';save(false)}
function cardHtml(c){let p=pct(c.spent,c.target), remain=Math.max(0,Number(c.target||0)-Number(c.spent||0)), ds=deadlineStatus(c,remain);return `<div class="card ${statusClass(p)} ${c.hidden?'hidden-card':''}"><div class="ch"><div class="icon" style="background:${c.color||'#111827'}">${c.short||'C'}</div><div class="body"><div class="name">${c.name}</div><div class="meta">${c.periodType==='hyundai'?'현대 24~23':'월 1일~말일'} · 목표 ${fmt(c.target)}</div><div class="remain ${remain<=0?'ok':'need'}">${remain<=0?'달성 완료':fmt(remain)+' 부족'}</div><div class="deadline ${ds.cls}">${ds.text}</div>${c.memo?`<div class="memo">${c.memo}</div>`:''}</div><div><div class="amt">${fmt(c.spent)}</div><div class="target ${statusClass(p)}">${p.toFixed(1)}%</div></div></div><div class="barw"><div class="bar" style="width:${p}%;background:${c.color||'#111827'}"></div></div><div class="row" style="padding:0 15px 15px"><button class="btn small blue" onclick="openCard('${c.id}')">수정</button><button class="btn small" onclick="quickAdd('${c.id}')">사용액 입력</button><button class="btn small orange" onclick="toggleHide('${c.id}')">${c.hidden?'복원':'숨김'}</button></div></div>`}
function updateDashboard(){const el=$('dashboardAlert');const active=data.cards.filter(c=>!c.hidden);let achieved=0,progress=0,shortage=0,list=[];active.forEach(c=>{let remain=Math.max(0,Number(c.target||0)-Number(c.spent||0));if(Number(c.target||0)>0&&remain<=0)achieved++;else if(Number(c.target||0)>0){progress++;shortage+=remain;list.push([c.name,remain])}});list=list.sort((a,b)=>b[1]-a[1]).slice(0,3);el.classList.add('show');el.innerHTML=`<b>전체 현황</b><br>카드 ${active.length}개 · 달성 ${achieved}개 · 진행중 ${progress}개<br>총 부족액 ${fmt(shortage)}${list.length?`<div class="alert-list">${list.map(x=>`<div class="alert-item"><b>${x[0]}</b><br>${fmt(x[1])} 부족</div>`).join('')}</div>`:''}`}
function updateDeadlineAlert(){const el=$('deadlineAlert');let items=data.cards.filter(c=>!c.hidden).map(c=>{let r=Math.max(0,Number(c.target||0)-Number(c.spent||0)),d=getPeriod(c.periodType||'monthly').dleft;return{c,r,d,s:deadlineStatus(c,r)}}).filter(x=>x.r>0&&x.d<=7);if(!items.length){el.classList.remove('show');el.innerHTML='';return}el.classList.add('show');el.innerHTML=`⚠️ <b>실적 마감 임박 카드</b><div class="alert-list">${items.map(x=>`<div class="alert-item"><b>${x.c.name}</b><br>${x.s.text}</div>`).join('')}</div>`}
function openCard(id){editing=id?data.cards.find(c=>c.id===id):null;const c=editing||{name:'',short:'',color:'#111827',target:0,spent:0,periodType:'monthly',group:'기타',memo:''};mt.innerText=editing?'카드 수정':'카드 추가';mb.innerHTML=`<div class="fg"><label>카드명</label><input id="cName" value="${c.name||''}"></div><div class="fg"><label>짧은 표시</label><input id="cShort" value="${c.short||''}"></div><div class="fg"><label>목표 실적</label><input id="cTarget" type="number" value="${c.target||0}"></div><div class="fg"><label>현재 사용금액</label><input id="cSpent" type="number" value="${c.spent||0}"></div><div class="fg"><label>실적 기간</label><select id="cPeriod"><option value="monthly" ${c.periodType!=='hyundai'?'selected':''}>당월 1일~말일</option><option value="hyundai" ${c.periodType==='hyundai'?'selected':''}>현대 24일~23일</option></select></div><div class="fg"><label>그룹</label><input id="cGroup" value="${c.group||'기타'}"></div><div class="fg"><label>색상</label><input id="cColor" value="${c.color||'#111827'}"></div><div class="fg"><label>메모</label><textarea id="cMemo">${c.memo||''}</textarea></div><div class="row"><button class="btn primary" onclick="saveCard()">저장</button>${editing?'<button class="btn red" onclick="deleteCard()">삭제</button>':''}<button class="btn" onclick="closeModal()">닫기</button></div>`;openModal()}
function saveCard(){let c=editing||{id:'card_'+Date.now(),hidden:false,kind:'normal'};c.name=cName.value.trim()||'새 카드';c.short=cShort.value.trim()||c.name.slice(0,2);c.target=Number(cTarget.value||0);c.spent=Number(cSpent.value||0);c.periodType=cPeriod.value;c.group=cGroup.value.trim()||'기타';c.color=cColor.value.trim()||'#111827';c.memo=cMemo.value.trim();if(!editing)data.cards.push(c);if(!data.groups.includes(c.group))data.groups.push(c.group);updateMonthlyRecord(c);save();closeModal();render();toast('카드 저장 완료')}
function deleteCard(){if(!editing)return;if(confirm('삭제할까요?')){data.cards=data.cards.filter(c=>c.id!==editing.id);save();closeModal();render()}}
function quickAdd(id){let c=data.cards.find(x=>x.id===id);let v=prompt('이번 달 사용금액을 입력하세요',c.spent||0);if(v!==null){c.spent=Number(v||0);updateMonthlyRecord(c);save();render();toast('사용금액 저장 완료')}}
function toggleHide(id){let c=data.cards.find(x=>x.id===id);c.hidden=!c.hidden;save();render()}function toggleHiddenView(){showHidden=!showHidden;render()}
function openGroupManager(){mt.innerText='그룹 관리';mb.innerHTML=`<div class="hint">쉼표로 구분해서 그룹을 입력하세요.</div><div class="fg"><label>그룹 목록</label><textarea id="gList">${(data.groups||[]).join(', ')}</textarea></div><div class="row"><button class="btn primary" onclick="saveGroups()">저장</button><button class="btn" onclick="closeModal()">닫기</button></div>`;openModal()}function saveGroups(){data.groups=gList.value.split(',').map(x=>x.trim()).filter(Boolean);save();closeModal();render()}
function updateMonthlyRecord(card){let key=getPeriod(card.periodType||'monthly').key;data.monthlyRecords[card.id]=data.monthlyRecords[card.id]||{};data.monthlyRecords[card.id][key]={label:getPeriod(card.periodType||'monthly').label,spent:Number(card.spent||0),target:Number(card.target||0),savedAt:new Date().toLocaleString('ko-KR')}}
function snapshot(reason){try{localStorage.setItem(SAFE_BACKUP,JSON.stringify({reason,time:new Date().toISOString(),data:JSON.parse(JSON.stringify(data))}))}catch(e){}}
function restoreSafeBackup(){try{let raw=localStorage.getItem(SAFE_BACKUP);if(!raw)throw new Error('안전 백업이 없습니다.');let b=JSON.parse(raw);data=b.data;migrate(data);save();render();toast('안전 백업 복원 완료')}catch(e){alert('복원 실패: '+e.message)}}
function isHyundaiCard(c){return c.periodType==='hyundai'}
function resetCardsByPeriod(type, reason){let targets=data.cards.filter(c=>type==='hyundai'?isHyundaiCard(c):!isHyundaiCard(c));if(!targets.length)return 0;snapshot(reason);data.history.unshift({time:new Date().toLocaleString('ko-KR'),reason,cards:data.cards.map(c=>({...c})),resetIds:targets.map(c=>c.id)});targets.forEach(c=>{c.spent=0;if(c.kind==='mboost')c.mPoint=0;updateMonthlyRecord(c)});return targets.length}
function resetMonth(all){if(all){if(!confirm('전체 데이터를 초기화할까요?'))return;snapshot('전체 초기화 전');localStorage.removeItem(STORE);data=load();save();render();toast('전체 초기화 완료');return}let hyCnt=data.cards.filter(isHyundaiCard).length, moCnt=data.cards.filter(c=>!isHyundaiCard(c)).length;let choice=prompt(`초기화할 대상을 입력하세요.
1 = 현대카드만 (${hyCnt}개)
2 = 기타카드만 (${moCnt}개)
3 = 현대+기타 전체`, '1');if(choice===null)return;let total=0;if(choice==='1')total+=resetCardsByPeriod('hyundai','수동 초기화: 현대카드');else if(choice==='2')total+=resetCardsByPeriod('monthly','수동 초기화: 기타카드');else if(choice==='3'){total+=resetCardsByPeriod('hyundai','수동 초기화: 현대카드');total+=resetCardsByPeriod('monthly','수동 초기화: 기타카드')}else{return alert('1, 2, 3 중 하나만 입력하세요.')}if(choice==='1'||choice==='3'){let m=getMPoint();m.earnedThisMonth=0;m.usedThisMonth=0;saveMPointMonth()}save();render();toast(`${total}개 카드 초기화 완료`)}
function showHistory(){mt.innerText='히스토리';let h=data.history||[];let rows=h.slice(0,12).map(x=>`<div class="month-row"><span>${x.time}<br><small>${x.reason}</small></span><b>${x.cards?x.cards.length+'개':''}</b></div>`).join('');mb.innerHTML=rows||'<div class="hint">히스토리가 없습니다.</div>';openModal()}
function backup(){data.lastBackupAt=Date.now();save();let blob=new Blob([JSON.stringify({app:'card-benefit-manager',version:APP_VERSION,savedAt:new Date().toISOString(),data},null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='BenefitManager_v6_6_2_backup.json';a.click();URL.revokeObjectURL(a.href);toast('백업 파일 생성 완료')}
function setCurrentPeriodMarker(){localStorage.setItem(MONTH,JSON.stringify({hyundai:getPeriod('hyundai').key,monthly:getPeriod('monthly').key,updatedAt:Date.now()}))}
function restore(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{let j=JSON.parse(r.result);data=j.data||j;migrate(data);setCurrentPeriodMarker();save();render();toast('복원 완료')}catch(err){alert('복원 실패: '+err.message)}};r.readAsText(f);e.target.value=''}
function getGithubConfig(){try{return JSON.parse(localStorage.getItem(GHCFG)||'{}')}catch(e){return {}}}function saveGithubConfig(cfg){localStorage.setItem(GHCFG,JSON.stringify(cfg))}function githubPath(cfg){return cfg.path||'backups/card-benefit-backup.json'}function githubApiBase(cfg){return `https://api.github.com/repos/${encodeURIComponent(cfg.owner)}/${encodeURIComponent(cfg.repo)}/contents/${githubPath(cfg)}`}function githubHeaders(token){return {'Authorization':'Bearer '+token,'Accept':'application/vnd.github+json','Content-Type':'application/json'}}function b64EncodeUnicode(str){return btoa(unescape(encodeURIComponent(str)))}function b64DecodeUnicode(str){return decodeURIComponent(escape(atob(str.replace(/\n/g,''))))}function getDeviceId(){let id=localStorage.getItem('benefit-manager-device-id');if(!id){id='dev_'+Date.now()+'_'+Math.random().toString(16).slice(2);localStorage.setItem('benefit-manager-device-id',id)}return id}function getDeviceName(){let n=localStorage.getItem('benefit-manager-device-name');if(!n){n=/iPad/i.test(navigator.userAgent)?'iPad':/iPhone/i.test(navigator.userAgent)?'iPhone':'Device';localStorage.setItem('benefit-manager-device-name',n)}return n}
function exportDataForGithub(){data.meta=data.meta||{};data.meta.savedAt=Date.now();data.meta.deviceId=getDeviceId();data.meta.deviceName=getDeviceName();return JSON.stringify({app:'card-benefit-manager',version:APP_VERSION,savedAt:new Date().toISOString(),savedAtMs:Date.now(),deviceId:getDeviceId(),deviceName:getDeviceName(),data},null,2)}
async function githubGetFile(cfg){let r=await fetch(githubApiBase(cfg),{headers:githubHeaders(cfg.token)});if(r.status===404)return null;if(!r.ok)throw new Error(await r.text());return await r.json()}async function githubPutFile(cfg,content,sha){let body={message:`BenefitManager v${APP_VERSION} backup ${new Date().toISOString()}`,content:b64EncodeUnicode(content)};if(sha)body.sha=sha;let r=await fetch(githubApiBase(cfg),{method:'PUT',headers:githubHeaders(cfg.token),body:JSON.stringify(body)});if(!r.ok)throw new Error(await r.text());return await r.json()}
function openGithubSettings(){let c=getGithubConfig();mt.innerText='GitHub 설정';mb.innerHTML=`<div class="fg"><label>GitHub ID</label><input id="ghOwner" value="${c.owner||''}"></div><div class="fg"><label>Repository</label><input id="ghRepo" value="${c.repo||''}"></div><div class="fg"><label>백업 경로</label><input id="ghPath" value="${c.path||'backups/card-benefit-backup.json'}"></div><div class="fg"><label>Token</label><input id="ghToken" type="password" value="${c.token||''}"></div><div class="fg"><label>자동 백업</label><select id="ghAuto"><option value="true" ${c.autoBackup!==false?'selected':''}>ON</option><option value="false" ${c.autoBackup===false?'selected':''}>OFF</option></select></div><div class="row"><button class="btn primary" onclick="saveGithubSettings()">저장</button><button class="btn" onclick="closeModal()">닫기</button></div>`;openModal()}function saveGithubSettings(){saveGithubConfig({owner:ghOwner.value.trim(),repo:ghRepo.value.trim(),path:ghPath.value.trim()||'backups/card-benefit-backup.json',token:ghToken.value.trim(),autoBackup:ghAuto.value==='true'});closeModal();render();toast('GitHub 설정 저장 완료')}
async function githubBackup(){try{let c=getGithubConfig();if(!c.owner||!c.repo||!c.token)throw new Error('GitHub 설정이 필요합니다.');$('syncPanel').innerText='GitHub 백업 중...';let f=await githubGetFile(c),sha=f&&f.sha;await githubPutFile(c,exportDataForGithub(),sha);data.lastBackupAt=Date.now();save();render();toast('GitHub 백업 완료')}catch(e){alert('GitHub 백업 실패: '+e.message)}}
async function githubRestore(){try{let c=getGithubConfig();if(!c.owner||!c.repo||!c.token)throw new Error('GitHub 설정이 필요합니다.');if(!confirm('GitHub 백업으로 현재 데이터를 덮어쓸까요?'))return;let f=await githubGetFile(c);if(!f)throw new Error('백업 파일이 없습니다.');let p=JSON.parse(b64DecodeUnicode(f.content));data=p.data||p;migrate(data);setCurrentPeriodMarker();save();render();toast('GitHub 복원 완료')}catch(e){alert('GitHub 복원 실패: '+e.message)}}
async function checkGithubLatest(silent){try{let c=getGithubConfig();if(!c.owner||!c.repo||!c.token)throw new Error('GitHub 설정이 필요합니다.');let f=await githubGetFile(c);if(!f){$('syncPanel').className='sync-panel warn';$('syncPanel').innerHTML='GitHub 백업 파일이 아직 없습니다.';return}let p=JSON.parse(b64DecodeUnicode(f.content));let r=Number(p.savedAtMs||p.data?.meta?.savedAt||p.data?.meta?.updatedAt||0),l=Number(data.meta?.updatedAt||0);if(r>l+1500){$('syncPanel').className='sync-panel warn';$('syncPanel').innerHTML=`GitHub에 더 최신 데이터가 있습니다.<br>기기: ${p.deviceName||p.data?.meta?.deviceName||'알 수 없음'} <button class="btn small orange" onclick="githubRestore()">복원</button>`}else{$('syncPanel').className='sync-panel';$('syncPanel').innerHTML='현재 기기 데이터가 최신이거나 GitHub와 동일합니다.';if(!silent)toast('최신 확인 완료')}}catch(e){if(!silent)alert('최신 확인 실패: '+e.message)}}
function updateGithubPanel(){let c=getGithubConfig();let el=$('githubPanel');if(!c.owner||!c.repo||!c.token){el.innerHTML='GitHub 백업 미설정 · 설정 후 iPhone/iPad 동기화 가능';return}el.innerHTML=`GitHub 설정됨: <b>${c.owner}/${c.repo}</b><br>경로: ${githubPath(c)} · 자동백업 ${c.autoBackup!==false?'ON':'OFF'}<br>마지막 백업: ${data.lastBackupAt?new Date(data.lastBackupAt).toLocaleString('ko-KR'):'기록 없음'}`}

async function checkAppUpdate(silent){try{let r=await fetch('./version.json?ts='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error('version.json을 찾을 수 없습니다.');let v=await r.json();let latest=String(v.version||'').trim();if(!latest)throw new Error('최신 버전 정보가 비어 있습니다.');if(latest!==APP_VERSION){mt.innerText='앱 업데이트';mb.innerHTML=`<div class="notice">새 버전이 있습니다.<br><b>현재 v${APP_VERSION}</b> → <b>최신 v${latest}</b></div><div class="hint">${v.message||''}</div>${Array.isArray(v.notes)?`<div class="month-list">${v.notes.map(n=>`<div class="month-row"><span>${n}</span></div>`).join('')}</div>`:''}<div class="row" style="margin-top:12px"><button class="btn primary" onclick="applyAppUpdate()">업데이트 적용</button><button class="btn" onclick="closeModal()">닫기</button></div>`;openModal()}else{if(!silent)toast('현재 앱이 최신 버전입니다')}}catch(e){if(!silent)alert('앱 업데이트 확인 실패: '+e.message)}}
async function applyAppUpdate(){snapshot('앱 업데이트 전 안전 백업');try{if('serviceWorker' in navigator){let regs=await navigator.serviceWorker.getRegistrations();for(let reg of regs){await reg.update();if(reg.waiting)reg.waiting.postMessage({type:'SKIP_WAITING'});}}if(window.caches){let keys=await caches.keys();await Promise.all(keys.filter(k=>k.includes('benefit-manager')).map(k=>caches.delete(k)))}toast('업데이트 적용 중');setTimeout(()=>location.reload(),500)}catch(e){alert('업데이트 적용 실패: '+e.message)}}

function openModal(){$('modal').style.display='flex'}function closeModal(){$('modal').style.display='none'}function toast(t){let el=$('toast');el.innerText=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800)}
function autoReset(){/* v6.6.2: 데이터 보호를 위해 자동 리셋은 임시 중단. 기간 표식만 저장하고 실제 초기화는 관리 > 사용금액 초기화에서 수동 선택. */let hyKey=getPeriod('hyundai').key, moKey=getPeriod('monthly').key;let raw=localStorage.getItem(MONTH);if(!raw){setCurrentPeriodMarker();return}let last;try{last=JSON.parse(raw)}catch(e){last={}}if(last.hyundai!==hyKey||last.monthly!==moKey){$('syncPanel').className='sync-panel warn';$('syncPanel').innerHTML='새 실적 기간이 감지되었습니다. 자동 리셋은 중단되어 있습니다.<br>필요하면 관리 → 사용금액 초기화에서 현대카드만 또는 기타카드만 직접 선택하세요.';setCurrentPeriodMarker();}}
autoReset();render();
</script>
</body></html>
