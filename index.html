<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#111827">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="카드혜택">
<link rel="manifest" href="manifest.json">
<title>카드 혜택매니저 v1.2</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#f3f4f6;--surface:#fff;--line:#e5e7eb;--text:#111827;--muted:#6b7280;--blue:#2563eb;--green:#16a34a}
body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;background:var(--bg);color:var(--text);font-size:14px;padding-bottom:90px}
header{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:14px 16px}
.h-top{display:flex;justify-content:space-between;align-items:center}.ttl{font-size:22px;font-weight:900}.sub{font-size:12px;color:var(--muted);margin-top:3px}.pill{font-size:12px;font-weight:800;color:#92400e;background:#fef3c7;border-radius:999px;padding:6px 10px}
main{padding:14px}.summary{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}.tile{background:white;border:1px solid var(--line);border-radius:16px;padding:13px}.tl{font-size:11px;color:var(--muted);font-weight:700}.tv{font-size:18px;font-weight:900;margin-top:3px}.ts{font-size:11px;color:var(--muted);margin-top:2px}
.notice{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:16px;padding:12px;margin-bottom:12px;font-size:12px;line-height:1.55}
.card{background:white;border:1px solid var(--line);border-radius:18px;margin-bottom:12px;overflow:hidden}.card-head{padding:15px;display:flex;align-items:center;gap:12px}.icon{width:46px;height:60px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:white;font-weight:900;font-size:13px;box-shadow:0 6px 15px rgba(0,0,0,.12);flex:none}.body{flex:1;min-width:0}.name{font-size:16px;font-weight:900}.meta{font-size:11px;color:var(--muted);margin-top:2px}.amt{font-size:16px;font-weight:900;text-align:right}.target{font-size:11px;color:var(--muted);text-align:right}
.bar-wrap{height:9px;background:#eef2f7;border-radius:999px;overflow:hidden;margin:0 15px 12px}.bar{height:100%;border-radius:999px;transition:.3s}.row{display:flex;gap:8px;padding:0 15px 15px}.btn{border:none;border-radius:12px;padding:10px 12px;font-weight:800;font-family:inherit;background:#f3f4f6;color:#374151;flex:1}.btn.primary{background:#111827;color:#fff}.btn.blue{background:#eff6ff;color:#1d4ed8}.btn.red{background:#fef2f2;color:#dc2626}
.boost{margin:0 15px 15px;background:linear-gradient(135deg,#1d4ed8,#0f172a);color:white;border-radius:16px;padding:14px}.boost-title{font-size:14px;font-weight:900;margin-bottom:10px;display:flex;justify-content:space-between}.boost-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.b-tile{background:rgba(255,255,255,.13);border-radius:12px;padding:10px}.b-l{font-size:10px;opacity:.78;font-weight:700}.b-v{font-size:18px;font-weight:900;margin-top:2px}.b-s{font-size:10px;opacity:.7;margin-top:2px}.boost .bar-wrap{margin:10px 0 5px;background:rgba(255,255,255,.25)}.boost .bar{background:white}.boost-note{font-size:11px;opacity:.8;display:flex;justify-content:space-between}
.tools{background:white;border:1px solid var(--line);border-radius:18px;padding:13px;margin-top:14px}.tools h3{font-size:15px;margin-bottom:8px}.tool-row{display:flex;gap:8px;flex-wrap:wrap}.tool-row .btn{flex:1 1 120px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;z-index:50}.sheet{background:white;width:100%;border-radius:24px 24px 0 0;padding:18px;max-height:88vh;overflow:auto}.handle{width:38px;height:4px;background:#d1d5db;border-radius:99px;margin:0 auto 14px}.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.mh b{font-size:18px}.x{border:none;background:#f3f4f6;border-radius:10px;width:34px;height:34px;font-size:18px}.fg{margin-bottom:12px}.fg label{display:block;font-size:12px;color:var(--muted);font-weight:800;margin-bottom:5px}.fg input{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:12px;font-size:16px;font-family:inherit}.hint{font-size:11px;color:var(--muted);line-height:1.5;margin-top:4px}.toast{position:fixed;left:50%;bottom:25px;transform:translateX(-50%);background:#111827;color:white;padding:11px 18px;border-radius:999px;font-size:13px;font-weight:800;opacity:0;transition:.25s;z-index:80}.toast.show{opacity:1}
</style></head>
<body>
<header><div class="h-top"><div><div class="ttl">카드 혜택매니저</div><div class="sub" id="periodText"></div></div><div class="pill" id="dDay">D-</div></div></header>
<main>
<div class="notice">데이터는 이 기기 브라우저 저장공간(LocalStorage)에만 저장됩니다. 서버 전송은 없고, Safari 데이터 삭제/기기 변경 시 사라질 수 있어 백업을 권장합니다.</div>
<div class="summary"><div class="tile"><div class="tl">총 월 사용금액</div><div class="tv" id="sumSpent">0원</div><div class="ts">우리카드 제외</div></div><div class="tile"><div class="tl">M BOOST 간편결제 잔여</div><div class="tv" id="sumEasyRemain">0원</div><div class="ts">5% 한도 기준</div></div></div>
<div id="cards"></div>
<div class="tools"><h3>관리</h3><div class="tool-row"><button class="btn" onclick="resetMonth(false)">이번 달 초기화</button><button class="btn red" onclick="resetMonth(true)">전체 초기화</button><button class="btn blue" onclick="backup()">백업</button><button class="btn" onclick="document.getElementById('restore').click()">복원</button><input id="restore" type="file" accept="application/json" style="display:none" onchange="restore(event)"></div></div>
</main>
<div class="modal" id="editModal" onclick="closeModal()"><div class="sheet" onclick="event.stopPropagation()"><div class="handle"></div><div class="mh"><b id="modalTitle">수정</b><button class="x" onclick="closeModal()">×</button></div><div id="modalBody"></div></div></div><div class="toast" id="toast"></div>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js');}
const STORE='benefit-manager-v1.2', MONTH='benefit-manager-period-key-v1.2';
const defaultCards=[
{id:'red',name:'SC제일은행-the Red',short:'RED',color:'#e11d48',target:300000,spent:1048382,hide:false,kind:'normal'},
{id:'mboost',name:'SC 현대카드 M BOOST',short:'M',color:'#0ea5e9',target:500000,spent:491966,hide:false,kind:'mboost',easy:{apple:0,naver:0,kakao:0,samsung:0,coupay:0,ssg:0,sk:0,etc:0}},
{id:'woori',name:'LG전자 우리카드',short:'W',color:'#f8fafc',target:300000,spent:318300,hide:true,kind:'normal'},
{id:'lotte',name:'스페셜 롯데카드(LG전자)',short:'L',color:'#a855f7',target:300000,spent:297000,hide:false,kind:'normal'},
{id:'ssg',name:'SSG닷컴 삼성카드',short:'SSG',color:'#f97316',target:100000,spent:49185,hide:false,kind:'normal'},
{id:'kakao',name:'카카오페이신용카드',short:'K',color:'#22c55e',target:200000,spent:48800,hide:false,kind:'normal'},
{id:'hipass',name:'카드의정석2 후불하이패스+',short:'H',color:'#0ea5e9',target:100000,spent:0,hide:false,kind:'normal'}];
let data=load(), editing=null;
function load(){try{let raw=localStorage.getItem(STORE); if(raw){let p=JSON.parse(raw);let mb=p.cards.find(c=>c.id==='mboost'); if(mb&&!mb.easy)mb.easy={apple:0,naver:0,kakao:0,samsung:0,coupay:0,ssg:0,sk:0,etc:0}; return p;}}catch(e){} return {cards:JSON.parse(JSON.stringify(defaultCards))};}
function save(){localStorage.setItem(STORE,JSON.stringify(data));}
function fmt(n){return Math.round(Number(n||0)).toLocaleString('ko-KR')+'원'} function fmtNum(n){return Math.round(Number(n||0)).toLocaleString('ko-KR')}
function period(){let now=new Date(), start=new Date(now.getFullYear(),now.getMonth()-1,24), end=new Date(now.getFullYear(),now.getMonth(),23); if(now.getDate()>23){start=new Date(now.getFullYear(),now.getMonth(),24); end=new Date(now.getFullYear(),now.getMonth()+1,23);} let dleft=Math.max(0,Math.ceil((new Date(end.getFullYear(),end.getMonth(),end.getDate()+1)-new Date(now.getFullYear(),now.getMonth(),now.getDate()))/86400000)-1); let key=start.toISOString().slice(0,10)+'_'+end.toISOString().slice(0,10); return {start,end,dleft,key,label:`${start.getFullYear()}.${String(start.getMonth()+1).padStart(2,'0')}.${String(start.getDate()).padStart(2,'0')} ~ ${end.getFullYear()}.${String(end.getMonth()+1).padStart(2,'0')}.${String(end.getDate()).padStart(2,'0')}`};}
function autoReset(){let p=period(), last=localStorage.getItem(MONTH); if(!last){localStorage.setItem(MONTH,p.key);return;} if(last!==p.key){data.cards.forEach(c=>{c.spent=0;if(c.kind==='mboost')Object.keys(c.easy).forEach(k=>c.easy[k]=0);}); save(); localStorage.setItem(MONTH,p.key); toast('새 산정기간으로 자동 초기화했습니다');}}
function pct(a,b){return b?Math.min(100,(Number(a||0)/Number(b))*100):0} function easyTotal(c){return Object.values(c.easy||{}).reduce((a,b)=>a+Number(b||0),0)}
function render(){save();let p=period();periodText.innerText='실적 산정기간 '+p.label+' · 결제일 5일 기준';dDay.innerText='D-'+p.dleft;let visible=data.cards.filter(c=>!c.hide);sumSpent.innerText=fmt(visible.reduce((s,c)=>s+Number(c.spent||0),0));let mb=data.cards.find(c=>c.id==='mboost'),et=mb?easyTotal(mb):0;sumEasyRemain.innerText=fmt(Math.max(0,200000-et));cards.innerHTML='';data.cards.forEach(c=>{let pr=pct(c.spent,c.target), boost=''; if(c.kind==='mboost'){let et=easyTotal(c),point=Math.min(10000,et*.05),rs=Math.max(0,200000-et),rp=Math.max(0,10000-point),ep=pct(et,200000);boost=`<div class="boost"><div class="boost-title"><span>간편결제 5% 적립</span><span>${ep.toFixed(1)}%</span></div><div class="boost-grid"><div class="b-tile"><div class="b-l">간편결제 사용액</div><div class="b-v">${fmt(et)}</div><div class="b-s">20만원 사용 시 한도</div></div><div class="b-tile"><div class="b-l">현재 적립 예상</div><div class="b-v">${fmtNum(point)} M</div><div class="b-s">잔여 ${fmtNum(rp)} M</div></div></div><div class="bar-wrap"><div class="bar" style="width:${ep}%;background:white"></div></div><div class="boost-note"><span>추가 사용 가능 ${fmt(rs)}</span><span>한도 10,000 M</span></div></div>`;} let colorText=c.id==='woori'?'#64748b':'#fff',bg=c.id==='woori'?'linear-gradient(135deg,#ffffff,#e5e7eb)':`linear-gradient(135deg,${c.color},${c.color}cc)`;cards.innerHTML+=`<div class="card"><div class="card-head"><div class="icon" style="background:${bg};color:${colorText}">${c.short}</div><div class="body"><div class="name">${c.name}</div><div class="meta">${c.hide?'정기결제용 · 총액에서 제외':'사용실적 확인'} · 목표 ${fmt(c.target)}</div></div><div><div class="amt">${fmt(c.spent)}</div><div class="target">${pr.toFixed(0)}%</div></div></div><div class="bar-wrap"><div class="bar" style="width:${pr}%;background:${pr>=100?'#16a34a':c.color}"></div></div>${boost}<div class="row"><button class="btn primary" onclick="openSpend('${c.id}')">실적 입력</button>${c.kind==='mboost'?`<button class="btn blue" onclick="openEasy()">간편결제 입력</button>`:''}</div></div>`;});}
function openSpend(id){let c=data.cards.find(x=>x.id===id);editing=id;modalTitle.innerText=c.name+' 실적 입력';modalBody.innerHTML=`<div class="fg"><label>현재 월 사용금액</label><input id="spendInput" type="number" value="${c.spent||0}"><div class="hint">카드 앱/네이버페이 카드 화면의 월 사용금액을 그대로 입력하세요.</div></div><div class="fg"><label>실적 목표</label><input id="targetInput" type="number" value="${c.target||0}"></div><button class="btn primary" style="width:100%" onclick="saveSpend()">저장</button>`;openModal();}
function saveSpend(){let c=data.cards.find(x=>x.id===editing);c.spent=Number(spendInput.value)||0;c.target=Number(targetInput.value)||0;closeModal();render();toast('저장했습니다');}
function openEasy(){let c=data.cards.find(x=>x.id==='mboost'),names={apple:'애플페이',naver:'네이버페이',kakao:'카카오페이',samsung:'삼성페이',coupay:'쿠페이',ssg:'SSG페이',sk:'SK페이',etc:'기타'};let html='<div class="hint" style="margin-bottom:12px">각 간편결제별 월 사용액을 입력하면 합산해 5% 적립 한도와 추가 사용 가능 금액을 계산합니다.</div>';for(let k in names){html+=`<div class="fg"><label>${names[k]}</label><input class="easyInput" data-k="${k}" type="number" value="${c.easy[k]||0}"></div>`;}html+='<button class="btn primary" style="width:100%" onclick="saveEasy()">저장</button>';modalTitle.innerText='M BOOST 간편결제 입력';modalBody.innerHTML=html;openModal();}
function saveEasy(){let c=data.cards.find(x=>x.id==='mboost');document.querySelectorAll('.easyInput').forEach(i=>c.easy[i.dataset.k]=Number(i.value)||0);closeModal();render();toast('간편결제 금액을 저장했습니다');}
function openModal(){editModal.style.display='flex'} function closeModal(){editModal.style.display='none'}
function resetMonth(all){if(!confirm(all?'전체 데이터를 기본값으로 초기화할까요?':'이번 산정기간 사용금액만 0으로 초기화할까요?'))return;if(all){data={cards:JSON.parse(JSON.stringify(defaultCards))};}else data.cards.forEach(c=>{c.spent=0;if(c.kind==='mboost')Object.keys(c.easy).forEach(k=>c.easy[k]=0);});localStorage.setItem(MONTH,period().key);render();toast('초기화했습니다');}
function backup(){let blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='card-benefit-backup.json';a.click();}
function restore(e){let file=e.target.files[0];if(!file)return;let r=new FileReader();r.onload=()=>{try{data=JSON.parse(r.result);save();render();toast('복원했습니다')}catch(err){alert('복원 실패: JSON 파일을 확인하세요')}};r.readAsText(file);}
function toast(msg){let t=document.getElementById('toast');t.innerText=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
autoReset();render();
</script></body></html>
