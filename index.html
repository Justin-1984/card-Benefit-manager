<header><div class="h"><div><div class="ttl">카드 혜택매니저</div><div class="sub" id="periodText"></div></div><div class="pill" id="dDay">현대 D-</div></div></header>
<main>
<div class="notice">v4.2: 숨김 카드 보기/복구, 그룹, 검색, 히스토리 저장을 포함했습니다. 아이폰 Safari 호환성을 위해 순서 변경은 ⬆️/⬇️ 버튼을 기본 방식으로 사용합니다. 그룹은 직접 추가/삭제/이름 변경할 수 있습니다. 현대카드는 24~23, 기타 카드는 1일~말일 기준입니다.</div>

<div class="row" style="padding:0 0 12px"><button class="btn primary" onclick="openCard()">+ 카드 추가</button><button class="btn blue" onclick="openGroupManager()">그룹 관리</button><button class="btn orange" onclick="togglePin()">M BOOST 상단 고정: <span id="pinState">ON</span></button><button class="btn blue" onclick="openHiddenManager()">숨김 카드 관리</button><button class="btn blue" onclick="toggleHiddenView()">숨김 카드 보기: <span id="hiddenState">OFF</span></button></div>

<div class="modal" id="modal" onclick="closeModal()"><div class="sheet" onclick="event.stopPropagation()"><div class="handle"></div><div class="mh"><b id="mt">수정</b><button class="x" onclick="closeModal()">×</button></div><div id="mb"></div></div></div><div class="toast" id="toast"></div>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js');}
const STORE='benefit-manager-v4.2', MONTH='benefit-manager-period-key-v4.2';
const COLORS=['#e11d48','#0ea5e9','#a855f7','#f97316','#22c55e','#334155','#111827','#2563eb'];
const defaultGroups=['현대','생활','자동결제','교통','기타'];
const defaultCards=[
{id:'red',name:'SC제일은행-the Red',short:'RED',color:'#e11d48',target:300000,spent:1048382,hidden:false,kind:'normal',periodType:'hyundai',collapsed:true,memo:'연 1,200만원 실적 목표',group:'현대',annualGoal:12000000,annualSpent:1048382},
{id:'mboost',name:'SC 현대카드 M BOOST',short:'M',color:'#0ea5e9',target:500000,spent:491966,hidden:false,kind:'mboost',mPoint:0,periodType:'hyundai',collapsed:false,memo:'간편결제 5% M포인트 확인',group:'현대'},
{id:'woori',name:'LG전자 우리카드',short:'W',color:'#94a3b8',target:300000,spent:318300,hidden:true,kind:'normal',periodType:'monthly',collapsed:true,memo:'30만원 정기결제용',group:'자동결제'},
{id:'lotte',name:'스페셜 롯데카드(LG전자)',short:'L',color:'#a855f7',target:300000,spent:297000,hidden:false,kind:'normal',periodType:'monthly',collapsed:true,memo:'',group:'자동결제'},
{id:'ssg',name:'SSG닷컴 삼성카드',short:'SSG',color:'#f97316',target:100000,spent:49185,hidden:false,kind:'normal',periodType:'monthly',collapsed:true,memo:'',group:'생활'},
{id:'kakao',name:'카카오페이신용카드',short:'K',color:'#22c55e',target:200000,spent:48800,hidden:false,kind:'normal',periodType:'monthly',collapsed:true,memo:'',group:'생활'},
{id:'hipass',name:'카드의정석2 후불하이패스+',short:'H',color:'#0ea5e9',target:100000,spent:0,hidden:false,kind:'normal',periodType:'monthly',collapsed:true,memo:'',group:'교통'}];
let data=load(), editing=null, dragId=null, showHidden=false;
function load(){try{let r=localStorage.getItem(STORE)||localStorage.getItem('benefit-manager-v2.3')||localStorage.getItem('benefit-manager-v2.1')||localStorage.getItem('benefit-manager-v2.0');if(r){let d=JSON.parse(r);if(d.pinMboost===undefined)d.pinMboost=true;if(!d.history)d.history=[];if(!d.monthlyRecords)d.monthlyRecords={};if(!d.groups)d.groups=[...defaultGroups];if(d.lastBackupAt===undefined)d.lastBackupAt=null;d.cards.forEach(c=>{if(c.id==='mboost'&&c.mPoint===undefined)c.mPoint=0;if(c.hidden===undefined)c.hidden=!!c.hide;if(!c.periodType)c.periodType=(c.id==='red'||c.id==='mboost'||/현대|Hyundai|M BOOST|Red/i.test(c.name))?'hyundai':'monthly';if(c.collapsed===undefined)c.collapsed=(c.kind==='mboost'?false:true);if(c.memo===undefined)c.memo='';if(!c.group)c.group=(c.periodType==='hyundai'?'현대':'기타');if(c.id==='red'||/red|레드/i.test(c.name)){if(c.annualGoal===undefined)c.annualGoal=12000000;if(c.annualSpent===undefined)c.annualSpent=Number(c.spent||0)}});return d}}catch(e){}return{pinMboost:true,history:[],monthlyRecords:{},lastBackupAt:null,groups:[...defaultGroups],cards:JSON.parse(JSON.stringify(defaultCards))}}
function save(){localStorage.setItem(STORE,JSON.stringify(data))}
function fmt(n){return Math.round(Number(n||0)).toLocaleString('ko-KR')+'원'}function num(n){return Math.round(Number(n||0)).toLocaleString('ko-KR')}
function getPeriod(type){let now=new Date(),y=now.getFullYear(),m=now.getMonth(),start,end,labelName;if(type==='hyundai'){start=new Date(y,m-1,24);end=new Date(y,m,23);if(now.getDate()>23){start=new Date(y,m,24);end=new Date(y,m+1,23)}labelName='현대 24~23'}else{start=new Date(y,m,1);end=new Date(y,m+1,0);labelName='월 1일~말일'}let dleft=Math.max(0,Math.ceil((new Date(end.getFullYear(),end.getMonth(),end.getDate()+1)-new Date(y,m,now.getDate()))/86400000)-1);let key=type+'_'+start.toISOString().slice(0,10)+'_'+end.toISOString().slice(0,10);let label=`${start.getFullYear()}.${String(start.getMonth()+1).padStart(2,'0')}.${String(start.getDate()).padStart(2,'0')} ~ ${end.getFullYear()}.${String(end.getMonth()+1).padStart(2,'0')}.${String(end.getDate()).padStart(2,'0')}`;return{key,dleft,label,labelName}}

function currentMonthKey(type){
  const p=getPeriod(type||'monthly');
  return p.key;
}
function cardMonthKey(card){
  return currentMonthKey(card.periodType||'monthly');
}
function ensureMonthly(){
  if(!data.monthlyRecords)data.monthlyRecords={};
}
function updateMonthlyRecord(card){
  ensureMonthly();
  const key=cardMonthKey(card);
  if(!data.monthlyRecords[card.id])data.monthlyRecords[card.id]={};
  data.monthlyRecords[card.id][key]={
    label:getPeriod(card.periodType||'monthly').label,
    spent:Number(card.spent||0),
    target:Number(card.target||0),
    savedAt:new Date().toLocaleString('ko-KR')
  };
}
function annualFromRecords(card){
  ensureMonthly();
  const y=new Date().getFullYear();
  const rec=data.monthlyRecords[card.id]||{};
  let sum=0, rows=[];
  Object.entries(rec).forEach(([k,v])=>{
    if(String(k).includes(String(y))){
      sum+=Number(v.spent||0);
      rows.push({key:k,label:v.label,spent:Number(v.spent||0)});
    }
  });
  rows.sort((a,b)=>b.key.localeCompare(a.key));
  return {sum,rows};
}
function updateRedAnnualFromRecords(){
  data.cards.forEach(c=>{
    if(c.annualGoal||c.id==='red'||/red|레드/i.test(c.name)){
      const a=annualFromRecords(c);
      if(a.sum>0)c.annualSpent=a.sum;
    }
  });
}
function backupWarning(){
  const el=document.getElementById('backupWarn');
  if(!el)return;
  if(!data.lastBackupAt){el.classList.add('show');el.innerHTML='⚠️ 아직 백업 기록이 없습니다. Safari 데이터 삭제에 대비해 백업을 권장합니다.';return;}
  const days=Math.floor((Date.now()-Number(data.lastBackupAt))/(1000*60*60*24));
  if(days>=14){el.classList.add('show');el.innerHTML=`⚠️ 마지막 백업 후 ${days}일 지났습니다. 백업을 권장합니다.`}
  else{el.classList.remove('show');el.innerHTML=''}
}

function saveSnapshot(reason){let hy=getPeriod('hyundai'),mo=getPeriod('monthly');data.history=data.history||[];data.history.unshift({time:new Date().toLocaleString('ko-KR'),reason,hyundai:hy.label,monthly:mo.label,total:data.cards.filter(c=>!c.hidden).reduce((s,c)=>s+Number(c.spent||0),0),cards:data.cards.map(c=>({name:c.name,spent:c.spent,target:c.target,mPoint:c.mPoint||0,annualSpent:c.annualSpent||0,annualGoal:c.annualGoal||0}))});data.history=data.history.slice(0,12)}
function autoReset(){let hy=getPeriod('hyundai'),mo=getPeriod('monthly'),last=localStorage.getItem(MONTH),cur=hy.key+'|'+mo.key;if(!last){localStorage.setItem(MONTH,cur);return}if(last!==cur){saveSnapshot('자동 초기화 전 저장');data.cards.forEach(c=>{c.spent=0;if(c.kind==='mboost')c.mPoint=0});save();localStorage.setItem(MONTH,cur);toast('새 산정기간 기준으로 자동 초기화했습니다')}}
function pct(a,b){return b?Math.min(100,(Number(a||0)/Number(b))*100):0}function statusClass(p){if(p>=100)return'green';if(p>=80)return'orange';return'red'}
function orderedCards(){let arr=[...data.cards];if(data.pinMboost){arr.sort((a,b)=>{if(a.kind==='mboost')return-1;if(b.kind==='mboost')return 1;return 0})}return arr}
function filteredCards(){let q=(search.value||'').toLowerCase().trim();return orderedCards().filter(c=>(showHidden||!c.hidden)&&(!q||(`${c.name} ${c.short} ${c.memo} ${c.group}`).toLowerCase().includes(q)))}
function render(){updateRedAnnualFromRecords();save();let hy=getPeriod('hyundai'),mo=getPeriod('monthly');periodText.innerText='현대 '+hy.label+' · 기타 '+mo.label;dDay.innerText='현대 D-'+hy.dleft;pinState.innerText=data.pinMboost?'ON':'OFF';hiddenState.innerText=showHidden?'ON':'OFF';sumSpent.innerText=fmt(data.cards.filter(c=>!c.hidden).reduce((s,c)=>s+Number(c.spent||0),0));let m=data.cards.find(c=>c.kind==='mboost'),rp=Math.max(0,10000-(m?Number(m.mPoint||0):0));sumEasyRemain.innerText=fmt(rp/0.05);cards.innerHTML='';let groups={};filteredCards().forEach(c=>(groups[c.group||'기타']=groups[c.group||'기타']||[]).push(c));Object.keys(groups).forEach(g=>{let sec=document.createElement('section');sec.className='group';sec.innerHTML=`<div class="gt">${g} <span>${groups[g].length}장</span></div><div class="cards"></div>`;let grid=sec.querySelector('.cards');groups[g].forEach(c=>grid.insertAdjacentHTML('beforeend',cardHtml(c)));cards.appendChild(sec)});attachDrag();backupWarning()}
function cardHtml(c){let pr=pct(c.spent,c.target),st=statusClass(pr),cp=getPeriod(c.periodType||'monthly'),boost='',annual='';if(c.annualGoal){let as=Number(c.annualSpent||0),ag=Number(c.annualGoal||12000000),ap=pct(as,ag),ar=Math.max(0,ag-as);let arw=annualFromRecords(c).rows.slice(0,6).map(r=>`<div class="month-row"><span>${r.label}</span><b>${fmt(r.spent)}</b></div>`).join('');annual=`<div class="annual"><div class="bt"><span>연간 실적 목표</span><span>${ap.toFixed(1)}%</span></div><div class="annual-grid"><div class="annual-tile"><div class="annual-l">누적 실적</div><div class="annual-v">${fmt(as)}</div><div class="annual-s">목표 ${fmt(ag)}</div></div><div class="annual-tile"><div class="annual-l">남은 금액</div><div class="annual-v">${fmt(ar)}</div><div class="annual-s">월 평균 필요 ${fmt(ar/Math.max(1,12-new Date().getMonth()))}</div></div></div><div class="barw"><div class="bar" style="width:${ap}%"></div></div><div class="annual-note"><span>RED 연 1,200만원 목표</span><span>${ap>=100?'달성 완료':'진행 중'}</span></div>${arw?`<div class="month-list">${arw}</div>`:`<div class="month-row">월별 기록은 실적 저장 후 표시됩니다.</div>`}</div>`}if(c.kind==='mboost'){let mp=Math.min(10000,Number(c.mPoint||0)),remainP=Math.max(0,10000-mp),used=mp/0.05,remain=remainP/0.05,ep=pct(mp,10000);boost=`<div class="boost"><div class="bt"><span>간편결제 5% 적립</span><span>${ep.toFixed(1)}%</span></div><div class="bg"><div class="bi"><div class="bl">입력한 현재 적립</div><div class="bv">${num(mp)} M</div><div class="bs">한도 10,000 M</div></div><div class="bi"><div class="bl">추가 사용 가능</div><div class="bv">${fmt(remain)}</div><div class="bs">잔여 ${num(remainP)} M</div></div></div><div class="barw"><div class="bar" style="width:${ep}%"></div></div><div class="bn"><span>추정 사용액 ${fmt(used)}</span><span>5% 기준</span></div></div>`}return `<div class="card ${st} ${c.collapsed?'collapsed':''} ${c.hidden?'hidden-card':''}" draggable="false" data-id="${c.id}"><div class="ch"><div class="drag" draggable="true" data-id="${c.id}">☰</div><div class="mainclick" onclick="toggleCollapse('${c.id}')"><div class="icon" style="background:linear-gradient(135deg,${c.color},${c.color}cc)">${c.short||'CARD'}</div><div class="body"><div class="name">${c.collapsed?'▶':'▼'} ${c.name}</div><div class="meta">${c.hidden?'숨김 · 총액 제외':'사용실적 확인'} · 목표 ${fmt(c.target)}</div><div class="period">📅 ${cp.labelName}: ${cp.label} · D-${cp.dleft}</div>${c.memo?`<div class="memo">${c.memo}</div>`:''}</div><div><div class="amt">${fmt(c.spent)}</div><div class="target ${st}">${pr.toFixed(0)}%</div></div></div></div><div class="barw"><div class="bar" style="width:${pr}%;background:${st==='green'?'#16a34a':st==='orange'?'#f59e0b':'#ef4444'}"></div></div><div class="detail">${annual}${boost}<div class="row"><button class="btn primary" onclick="openSpend('${c.id}')">실적 입력</button>${c.kind==='mboost'?`<button class="btn blue" onclick="openMPoint()">M포인트 입력</button>`:''}<button class="btn" onclick="openCard('${c.id}')">카드 수정</button><button class="btn ${c.hidden?'blue':'orange'}" onclick="toggleHidden('${c.id}')">${c.hidden?'다시 표시':'숨김'}</button><button class="btn small" onclick="moveCard('${c.id}',-1)">⬆️</button><button class="btn small" onclick="moveCard('${c.id}',1)">⬇️</button></div></div></div>`}
function attachDrag(){document.querySelectorAll('.drag').forEach(h=>{h.addEventListener('dragstart',e=>{dragId=h.dataset.id;h.closest('.card').classList.add('dragging');e.dataTransfer.effectAllowed='move'});h.addEventListener('dragend',()=>{document.querySelectorAll('.dragging').forEach(x=>x.classList.remove('dragging'))})});document.querySelectorAll('.card').forEach(el=>{el.addEventListener('dragover',e=>e.preventDefault());el.addEventListener('drop',e=>{e.preventDefault();let target=el.dataset.id;if(dragId&&target&&dragId!==target)moveTo(dragId,target)})})}
function moveTo(from,to){let i=data.cards.findIndex(c=>c.id===from),j=data.cards.findIndex(c=>c.id===to);if(i<0||j<0)return;let [x]=data.cards.splice(i,1);data.cards.splice(j,0,x);render();toast('순서를 변경했습니다')}
function moveCard(id,dir){let i=data.cards.findIndex(c=>c.id===id);let j=i+dir;if(i<0||j<0||j>=data.cards.length){toast('더 이동할 수 없습니다');return;}let [x]=data.cards.splice(i,1);data.cards.splice(j,0,x);render();toast('순서를 변경했습니다')}
function toggleCollapse(id){let c=data.cards.find(x=>x.id===id);c.collapsed=!c.collapsed;render()}function togglePin(){data.pinMboost=!data.pinMboost;render()}function toggleHiddenView(){showHidden=!showHidden;render()}function toggleHidden(id){let c=data.cards.find(x=>x.id===id);c.hidden=!c.hidden;render();toast(c.hidden?'숨김 처리했습니다':'다시 표시했습니다')}

function getGroups(){
  const set=new Set([...(data.groups||defaultGroups)]);
  data.cards.forEach(c=>{if(c.group)set.add(c.group)});
  if(!set.has('기타'))set.add('기타');
  return [...set];
}
function openGroupManager(){
  const groups=getGroups();
  mt.innerText='그룹 관리';
  mb.innerHTML=`<div class="hint" style="margin-bottom:12px">그룹명을 바꾸면 해당 그룹에 속한 카드들도 함께 이동합니다. 삭제하면 그 그룹의 카드는 '기타'로 이동합니다.</div>
  <div id="groupList">${groups.map(g=>`<div class="fg"><label>그룹명</label><div class="row" style="padding:0"><input class="groupName" data-old="${g}" value="${g}" style="flex:1"><button class="btn red" style="flex:0 0 70px" onclick="deleteGroup('${g}')">삭제</button></div></div>`).join('')}</div>
  <div class="fg"><label>새 그룹 추가</label><input id="newGroupName" placeholder="예: 해외, 구독, 가족카드"></div>
  <button class="btn blue" style="width:100%;margin-bottom:8px" onclick="addGroup()">그룹 추가</button>
  <button class="btn primary" style="width:100%" onclick="saveGroups()">저장</button>`;
  openModal();
}
function addGroup(){
  const name=(newGroupName.value||'').trim();
  if(!name){toast('그룹명을 입력하세요');return;}
  data.groups=getGroups();
  if(!data.groups.includes(name))data.groups.push(name);
  openGroupManager();
  toast('그룹을 추가했습니다');
}
function saveGroups(){
  let next=[];
  document.querySelectorAll('.groupName').forEach(inp=>{
    const old=inp.dataset.old;
    const name=(inp.value||'').trim()||'기타';
    if(!next.includes(name))next.push(name);
    data.cards.forEach(c=>{if(c.group===old)c.group=name});
  });
  if(!next.includes('기타'))next.push('기타');
  data.groups=next;
  closeModal();render();toast('그룹을 저장했습니다');
}
function deleteGroup(g){
  if(g==='기타'){toast('기타 그룹은 삭제할 수 없습니다');return;}
  if(!confirm(`'${g}' 그룹을 삭제할까요? 이 그룹의 카드는 기타로 이동합니다.`))return;
  data.cards.forEach(c=>{if(c.group===g)c.group='기타'});
  data.groups=getGroups().filter(x=>x!==g);
  if(!data.groups.includes('기타'))data.groups.push('기타');
  openGroupManager();
}

function openSpend(id){let c=data.cards.find(x=>x.id===id);editing=id;mt.innerText=c.name+' 실적 입력';mb.innerHTML=`<div class="fg"><label>현재 사용금액</label><input id="spendInput" type="number" value="${c.spent||0}"></div><div class="fg"><label>실적 목표</label><input id="targetInput" type="number" value="${c.target||0}"></div>${c.annualGoal?`<div class="fg"><label>연간 누적 실적</label><input id="annualSpentInput" type="number" value="${c.annualSpent||0}"><div class="hint">RED 카드 연간 누적액도 함께 수정할 수 있습니다.</div></div>`:''}<button class="btn primary" style="width:100%" onclick="saveSpend()">저장</button>`;openModal()}
function saveSpend(){let c=data.cards.find(x=>x.id===editing);c.spent=Number(spendInput.value)||0;c.target=Number(targetInput.value)||0;if(c.annualGoal&&document.getElementById('annualSpentInput'))c.annualSpent=Number(annualSpentInput.value)||0;updateMonthlyRecord(c);updateRedAnnualFromRecords();closeModal();render();toast('실적과 월별 기록을 저장했습니다')}
function openMPoint(){let c=data.cards.find(x=>x.kind==='mboost');mt.innerText='M BOOST 현재 적립 M포인트';mb.innerHTML=`<div class="fg"><label>간편결제 5% 현재 적립 M포인트</label><input id="mpInput" type="number" value="${c.mPoint||0}"><div class="hint">예: 7250 입력 → 추가 사용 가능 55,000원.</div></div><button class="btn primary" style="width:100%" onclick="saveMPoint()">저장</button>`;openModal()}
function saveMPoint(){let c=data.cards.find(x=>x.kind==='mboost');c.mPoint=Number(mpInput.value)||0;closeModal();render()}
function openCard(id){editing=id||null;let c=id?data.cards.find(x=>x.id===id):{name:'',short:'',color:COLORS[0],target:0,spent:0,hidden:false,kind:'normal',periodType:'monthly',memo:'',collapsed:true,group:'기타'};mt.innerText=id?'카드 수정':'카드 추가';mb.innerHTML=`<div class="fg"><label>카드명</label><input id="cardName" value="${c.name||''}"></div><div class="fg"><label>카드 약칭</label><input id="cardShort" value="${c.short||''}" maxlength="4"></div><div class="fg"><label>그룹</label><select id="cardGroup">${getGroups().map(g=>`<option ${g===(c.group||'기타')?'selected':''}>${g}</option>`).join('')}</select></div><div class="fg"><label>실적 목표</label><input id="cardTarget" type="number" value="${c.target||0}"></div><div class="fg"><label>현재 사용금액</label><input id="cardSpent" type="number" value="${c.spent||0}"></div><div class="fg"><label>연간 목표금액 (RED 카드용, 없으면 0)</label><input id="annualGoal" type="number" value="${c.annualGoal||0}"><div class="hint">RED 카드 연 1,200만원 목표는 12000000 입력</div></div><div class="fg"><label>연간 누적 실적</label><input id="annualSpent" type="number" value="${c.annualSpent||0}"><div class="hint">월별 히스토리와 별개로 현재까지의 누적 실적을 직접 보정할 수 있습니다.</div></div><div class="fg"><label>메모</label><textarea id="cardMemo">${c.memo||''}</textarea></div><div class="fg"><label>산정기간</label><select id="cardPeriod"><option value="monthly" ${c.periodType!=='hyundai'?'selected':''}>해당월 1일~말일</option><option value="hyundai" ${c.periodType==='hyundai'?'selected':''}>현대카드 24일~23일</option></select></div><div class="fg"><label>색상</label><select id="cardColor">${COLORS.map(x=>`<option value="${x}" ${x===c.color?'selected':''}>${x}</option>`).join('')}</select></div><div class="fg"><label>카드 종류</label><select id="cardKind"><option value="normal" ${c.kind!=='mboost'?'selected':''}>일반 실적 카드</option><option value="mboost" ${c.kind==='mboost'?'selected':''}>M BOOST 간편결제 카드</option></select></div><div class="fg"><label>표시 상태</label><select id="cardHidden"><option value="false" ${!c.hidden?'selected':''}>표시</option><option value="true" ${c.hidden?'selected':''}>숨김</option></select></div><button class="btn primary" style="width:100%;margin-bottom:8px" onclick="saveCard()">저장</button>${id?`<button class="btn red" style="width:100%" onclick="deleteCard()">삭제</button>`:''}`;openModal()}
function saveCard(){let old=editing?data.cards.find(x=>x.id===editing):null;let obj={id:editing||('card_'+Date.now()),name:cardName.value.trim()||'새 카드',short:cardShort.value.trim()||'C',group:cardGroup.value,color:cardColor.value,target:Number(cardTarget.value)||0,spent:Number(cardSpent.value)||0,hidden:cardHidden.value==='true',kind:cardKind.value,periodType:cardPeriod.value,memo:cardMemo.value.trim(),collapsed:old?old.collapsed:true,annualGoal:Number(annualGoal.value)||0,annualSpent:Number(annualSpent.value)||0};if(obj.kind==='mboost')obj.mPoint=old&&old.mPoint?old.mPoint:0;if(editing)data.cards=data.cards.map(c=>c.id===editing?obj:c);else data.cards.push(obj);closeModal();render()}
function deleteCard(){if(!confirm('이 카드를 삭제할까요?'))return;data.cards=data.cards.filter(c=>c.id!==editing);closeModal();render()}

function openHiddenManager(){
  const hidden=data.cards.filter(c=>c.hidden);
  mt.innerText='숨김 카드 관리';
  if(!hidden.length){
    mb.innerHTML='<div class="hint">숨김 처리된 카드가 없습니다.</div>';
    openModal();return;
  }
  mb.innerHTML=`<div class="hidden-list">${hidden.map(c=>`<div class="hidden-item"><b>${c.name}</b><div class="hint">${c.group||'기타'} · 목표 ${fmt(c.target)}</div><div class="row" style="padding:10px 0 0"><button class="btn blue" onclick="toggleHidden('${c.id}');openHiddenManager()">다시 표시</button><button class="btn" onclick="openCard('${c.id}')">수정</button></div></div>`).join('')}</div>`;
  openModal();
}

function showHistory(){ensureMonthly();mt.innerText='월별 히스토리';let parts=[];data.cards.forEach(c=>{let rec=data.monthlyRecords[c.id]||{};let rows=Object.entries(rec).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,12);if(rows.length){parts.push(`<div class="notice"><b>${c.name}</b>${rows.map(([k,v])=>`<div class="month-row light"><span>${v.label}</span><b>${fmt(v.spent)}</b></div>`).join('')}</div>`)}});let h=data.history||[];if(h.length){parts.push(`<div class="notice"><b>초기화 스냅샷</b>${h.map(x=>`<div class="month-row light"><span>${x.time}<br>${x.reason}</span><b>${fmt(x.total)}</b></div>`).join('')}</div>`)}mb.innerHTML=parts.length?parts.join(''):'<div class="hint">저장된 히스토리가 없습니다. 실적 입력 후 저장하면 카드별 월별 기록이 표시됩니다.</div>';openModal()}
function openModal(){modal.style.display='flex'}function closeModal(){modal.style.display='none'}
function resetMonth(all){if(!confirm(all?'전체 데이터를 기본값으로 초기화할까요?':'현재 사용금액/M포인트만 초기화할까요?'))return;if(all){data={pinMboost:true,history:[],monthlyRecords:{},lastBackupAt:null,groups:[...defaultGroups],cards:JSON.parse(JSON.stringify(defaultCards))}}else{saveSnapshot('수동 초기화 전 저장');data.cards.forEach(c=>{c.spent=0;if(c.kind==='mboost')c.mPoint=0})}localStorage.setItem(MONTH,getPeriod('hyundai').key+'|'+getPeriod('monthly').key);render()}
function backup(){data.lastBackupAt=Date.now();save();let b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='card-benefit-backup.json';a.click();render();toast('백업 파일을 만들었습니다')}
function restore(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{data=JSON.parse(r.result);save();render();toast('복원했습니다')}catch(err){alert('복원 실패')}};r.readAsText(f)}
function toast(msg){let t=document.getElementById('toast');t.innerText=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
autoReset();render();
</script></body></html>
